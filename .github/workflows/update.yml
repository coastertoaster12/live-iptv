name: Daily IPTV Refresh

on:
  schedule:
    # This runs the script every 6 hours on the dot (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Gives you a manual "Run" button to test it instantly

jobs:
  refresh-playlist:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install beautifulsoup4

    - name: Generate Fresh Links
      run: python scraper.py

    - name: Commit Back to GitHub
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add playlist.m3u
        git commit -m "Automated Link Refresh" || echo "Links are already fresh"
        git push
